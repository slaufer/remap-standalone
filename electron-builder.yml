appId: app.remap-keys.remap
productName: Remap
copyright: Copyright © 2024 Remap

directories:
  output: dist-electron
  # Override the default ("build") to avoid colliding with Vite's output directory
  buildResources: buildAssets

# No native modules need rebuilding — the app is a pure React bundle in an Electron shell
npmRebuild: false

# Only include what is needed: compiled main process + web build + manifest
files:
  - electron-out/**/*
  - build/**/*
  - package.json

win:
  target:
    - target: portable
      arch: [x64]
  icon: public/logo512.png

mac:
  target:
    - target: zip
      arch: [x64, arm64]
  icon: public/logo512.png
  category: public.app-category.utilities

linux:
  target:
    - AppImage
  icon: public/logo512.png
  category: Utility

publish:
  provider: github
  releaseType: release
